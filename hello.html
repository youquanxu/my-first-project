<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>龙虾干活啦</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #3498db;
            font-family: 'Arial', sans-serif;
        }
        h1 {
            font-size: 4em;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <h1>🦞 龙虾干活啦</h1>
</body>
</html>
